name: Clawdex Channel CI

on:
  push:
    paths:
      - "clawdex-openclaw-channel/**"
      - ".github/workflows/clawdex-channel-ci.yml"
  pull_request:
    paths:
      - "clawdex-openclaw-channel/**"
      - ".github/workflows/clawdex-channel-ci.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clawdex-openclaw-channel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Pack dry run
        run: npm run pack:check
