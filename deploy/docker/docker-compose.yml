services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: clawdex-app
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - clawdex_data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: clawdex-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${CLAWDEX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  clawdex_data:
