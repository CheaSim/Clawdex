services:
  clawdex:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: clawdex-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - clawdex_data:/app/data

volumes:
  clawdex_data:
